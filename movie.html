<!DOCTYPE html>
<html lang="lt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Filmas</title>
  <link rel="icon" type="image/svg+xml" href="images/favicon.svg">
  <link rel="stylesheet" href="css/style.css?v=2">
</head>
<body class="has-bottom-bar">

  <div id="movie-content">
    <div style="text-align:center; padding-top: 50px;">Kraunama...</div>
  </div>

  <div id="comment-modal" class="modal hidden">
    <div class="modal-content">
      <h3>Palikti komentarą</h3>
      <input type="text" id="comment-name" placeholder="Jūsų vardas">
      <textarea id="comment-text" placeholder="Parašykite komentarą..."></textarea>
      <button id="submit-comment" class="btn-outline">Išsiųsti</button>
      <button id="close-modal" class="btn-outline" style="border-color: #666; color: #666;">Uždaryti</button>
    </div>
  </div>

  <nav class="bottom-bar"></nav>

  <script type="module" src="js/movie.js?v=2"></script>
</body>
</html>
